<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Jane Bloglife</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="score-bar">
    ❤️ Engagement Score: <span id="score-display">0</span>
  </div>

  <nav id="navbar">
    <a href="#home" class="nav-link brand">JANE BLOGLIFE</a>
    <div class="nav-right">
      <a href="#home" class="nav-link">HOME</a>
      <a href="#blog" class="nav-link">BLOG</a>
      <a href="#about" class="nav-link">ABOUT</a>
      <a href="#contact" class="nav-link">CONTACT</a>

  </nav>

  <div id="search-section">
    <input type="text" id="search-input" placeholder="  Search blog posts..." />
  </div>

  <header id="home" class="hero-header">
    <img src="https://www.w3schools.com/w3images/jane.jpg" alt="Jane" class="hero-img" />
